<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あみだくじメーカー</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎋</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== 設定画面 ========== -->
<section id="setup-screen" class="screen">
  <h1>🎋 あみだくじメーカー 🎋</h1>

  <div class="card">
    <h2>1. くじの本数</h2>
    <div class="row">
      <input type="range" id="line-count" min="2" max="20" value="6">
      <span id="line-count-label" class="count-badge">6本</span>
    </div>
  </div>

  <div class="card">
    <h2>2. あたりの設定</h2>
    <p class="hint">賞の名前・本数・演出を自由に設定できます。残りの枠には「デフォルト賞」が入ります。</p>
    <table id="prize-table">
      <thead>
        <tr><th>賞の名前</th><th>本数</th><th>演出</th><th></th></tr>
      </thead>
      <tbody id="prize-tbody"><!-- JSで生成 --></tbody>
    </table>
    <button id="add-prize-btn" class="btn btn-sub">＋ 賞を追加</button>

    <div class="default-prize-row">
      <label>残り <span id="rest-count">?</span> 本のデフォルト賞：</label>
      <input type="text" id="default-prize-name" value="小吉" maxlength="10">
      <select id="default-prize-effect">
        <option value="jackpot">🏆 大当たり（豪華宝箱）</option>
        <option value="win">🎉 あたり（紙吹雪）</option>
        <option value="normal" selected>😊 普通</option>
        <option value="lose">😞 ハズレ（がっかり）</option>
        <option value="biglose">💣 大外れ（爆発）</option>
      </select>
    </div>
    <p id="prize-error" class="error hidden"></p>
  </div>

  <div class="card">
    <h2>3. 参加者の名前（任意）</h2>
    <div id="player-names" class="player-names"><!-- JSで生成 --></div>
  </div>

  <div class="card">
    <h2>4. オプション</h2>
    <div class="row wrap">
      <label>アニメ速度：
        <select id="anim-speed">
          <option value="slow">ゆっくり</option>
          <option value="normal" selected>普通</option>
          <option value="fast">速い</option>
        </select>
      </label>
      <label>横線の密度：
        <select id="bridge-density">
          <option value="low">少なめ</option>
          <option value="mid" selected>普通</option>
          <option value="high">多め</option>
        </select>
      </label>
      <label><input type="checkbox" id="sound-enabled" checked> 効果音</label>
    </div>
  </div>

  <button id="start-btn" class="btn btn-main">あみだくじを作る！</button>
</section>

<!-- ========== ゲーム画面 ========== -->
<section id="game-screen" class="screen hidden">
  <h1>🎋 くじを選んでね！</h1>
  <p id="game-status" class="status">上の番号をタップしてスタート</p>
  <div id="canvas-wrap">
    <canvas id="amida-canvas"></canvas>
  </div>
  <div class="row center gap">
    <button id="reveal-all-btn" class="btn btn-sub">📋 結果をまとめて表示</button>
    <button id="back-btn" class="btn btn-ghost">← 設定に戻る</button>
  </div>

  <!-- まとめ表示パネル -->
  <div id="summary-panel" class="card hidden">
    <h2>📋 結果一覧</h2>
    <table id="summary-table">
      <thead><tr><th>参加者</th><th>結果</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<!-- ========== 結果発表モーダル ========== -->
<div id="result-modal" class="modal hidden">
  <div id="effect-layer"></div>
  <div class="modal-content" id="result-content">
    <p id="result-player" class="result-player"></p>
    <p id="result-drumroll" class="result-drumroll">結果は・・・</p>
    <p id="result-prize" class="result-prize hidden"></p>
    <button id="result-close" class="btn btn-main hidden">閉じる</button>
  </div>
</div>

<script src="effects.js"></script>
<script src="app.js"></script>
</body>
</html>
